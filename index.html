<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🌋 VOLCANO POS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --water:#185FA5;--water-bg:#E6F1FB;--water-t:#0C447C;
  --fire:#BA7517;--fire-bg:#FAEEDA;--fire-t:#633806;
  --noodle:#0F6E56;--noodle-bg:#E1F5EE;--noodle-t:#085041;
  --bg:#f5f4f0;--card:#ffffff;--border:#e0ddd6;--border2:#c8c4bb;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--card:#2c2c2e;--border:#3a3a3c;--border2:#48484a;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;}
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:15px;font-weight:700;color:var(--text)}.logo em{color:var(--fire);font-style:normal}
.vtabs{display:flex;gap:4px}
.vtab{padding:6px 12px;border:1px solid var(--border2);border-radius:99px;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:inherit}
.vtab.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.table-bar{padding:7px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.table-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.table-label{font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap}
.tno-custom{width:58px;padding:5px 7px;border:1px solid var(--border);border-radius:99px;background:var(--bg);font-size:12px;color:var(--text);text-align:center;font-family:inherit}
.table-scroll{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.table-scroll::-webkit-scrollbar{display:none}
.tno-btn{padding:5px 10px;border:1px solid var(--border);border-radius:99px;background:var(--bg);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;flex-shrink:0;font-family:inherit}
.tno-btn.on{background:var(--fire);color:#fff;border-color:var(--fire)}
.view{display:none;flex:1;overflow:hidden;flex-direction:column}.view.on{display:flex}
.station-tabs{display:flex;gap:6px;padding:9px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:7px 4px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);text-align:center;line-height:1.5;font-family:inherit}
.stab.on-water{background:var(--water-bg);color:var(--water-t);border-color:var(--water)}
.stab.on-fire{background:var(--fire-bg);color:var(--fire-t);border-color:var(--fire)}
.stab.on-noodle{background:var(--noodle-bg);color:var(--noodle-t);border-color:var(--noodle)}
.order-body{display:flex;flex:1;overflow:hidden;flex-direction:column}
.menu-scroll{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.panel{display:none}.panel.on{display:block}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:10px 0 5px}
.sec-title:first-child{margin-top:0}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:6px;margin-bottom:4px}
.mitem{padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);cursor:pointer}
.mitem:active{opacity:.65}
.mitem .zh{font-size:12px;font-weight:600;color:var(--text)}
.mitem .en{font-size:10px;color:var(--text3);margin-top:1px;line-height:1.3}
.mitem .pr{font-size:12px;font-weight:500;color:var(--text2);margin-top:4px}
.mitem.paused{opacity:.42;position:relative}
.mitem.paused::after{content:'暫停';position:absolute;top:5px;right:7px;font-size:9px;font-weight:700;color:#fff;background:#c0392b;border-radius:4px;padding:1px 5px}
.cart-area{background:var(--card);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0;max-height:44vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cart-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cart-title{font-size:13px;font-weight:600;color:var(--text)}
.clr-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 4px;font-family:inherit}
.crow{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}
.crow:last-of-type{border-bottom:none}
.cbadge{font-size:9px;padding:2px 5px;border-radius:99px;white-space:nowrap;font-weight:600;flex-shrink:0}
.bw{background:var(--water-bg);color:var(--water-t)}.bf{background:var(--fire-bg);color:var(--fire-t)}.bn{background:var(--noodle-bg);color:var(--noodle-t)}
.cname{flex:1;font-size:12px;color:var(--text);line-height:1.3}
.cmods{font-size:10px;color:var(--text3);margin-top:1px}
.cmods.fire{color:var(--fire-t);font-weight:600}
.cmods.water{color:var(--water-t);font-weight:600}
.qbtn{width:26px;height:26px;border:1px solid var(--border2);border-radius:50%;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;line-height:1;font-family:inherit}
.qty{font-size:12px;font-weight:600;min-width:18px;text-align:center;color:var(--text)}
.cprice{font-size:12px;color:var(--text2);min-width:40px;text-align:right;font-weight:500;flex-shrink:0}
.cart-foot-inner{padding-top:8px;border-top:1px solid var(--border);margin-top:6px}
.rmk{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);font-size:12px;color:var(--text);margin-bottom:8px;font-family:inherit}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.total-lbl{font-size:13px;font-weight:600;color:var(--text)}
.total-amt{font-size:19px;font-weight:700;color:var(--text)}
.send-btn{width:100%;padding:13px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:700;color:#fff;background:#25D366;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.send-btn:active{opacity:.8}
.empty-msg{font-size:12px;color:var(--text3);text-align:center;padding:12px 0}
.table-warn{font-size:11px;color:var(--fire-t);background:var(--fire-bg);border-radius:6px;padding:5px 8px;margin-bottom:6px;text-align:center;display:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end}
.modal-overlay.on{display:flex}
.modal-sheet{background:var(--card);border-radius:18px 18px 0 0;padding:16px 14px 36px;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.modal-sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.mod-group{margin-bottom:14px}
.mod-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.mod-hint{font-size:10px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;margin-bottom:6px;line-height:1.5}
.mod-opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.mod-opt{padding:7px 12px;border:1px solid var(--border);border-radius:99px;background:var(--bg);cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit}
.mod-opt:active{opacity:.7}
.mod-opt.sel-w{background:var(--water-bg);color:var(--water-t);border-color:var(--water);font-weight:600}
.mod-opt.sel-f{background:var(--fire-bg);color:var(--fire-t);border-color:var(--fire);font-weight:600}
.mod-opt.sel-n{background:var(--noodle-bg);color:var(--noodle-t);border-color:var(--noodle);font-weight:600}
.mod-opt.fire-needed{border-color:var(--fire);border-style:dashed}
.mod-opt.extra-charge{border-color:#c0392b}
.fire-badge{font-size:9px;background:var(--fire);color:#fff;border-radius:3px;padding:1px 3px;margin-left:3px;vertical-align:middle}
.extra-badge{font-size:9px;background:#c0392b;color:#fff;border-radius:3px;padding:1px 3px;margin-left:3px;vertical-align:middle}
.topping-status{font-size:11px;margin-top:6px;padding:5px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--border)}
.topping-status.over{border-color:var(--fire);color:var(--fire-t);background:var(--fire-bg)}
.section-divider{border:none;border-top:1px solid var(--border);margin:12px 0 10px}
.size-opts{display:flex;gap:6px;margin-top:4px}
.size-opt{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);text-align:center;font-family:inherit}
.size-opt.sel-w{background:var(--water-bg);color:var(--water-t);border-color:var(--water)}
.size-opt.sel-f{background:var(--fire-bg);color:var(--fire-t);border-color:var(--fire)}
.size-opt.sel-n{background:var(--noodle-bg);color:var(--noodle-t);border-color:var(--noodle)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-cancel{flex:0 0 80px;padding:12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit}
.modal-confirm{flex:1;padding:12px;border:none;border-radius:var(--radius);background:var(--fire);color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.no-orders{font-size:12px;color:var(--text3);text-align:center;padding:14px 0}
.manage-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end}
.manage-overlay.on{display:flex}
.manage-sheet{background:var(--card);border-radius:18px 18px 0 0;padding:16px 14px 36px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.manage-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.manage-row:last-of-type{border-bottom:none}
.manage-name{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.manage-price{font-size:12px;color:var(--text2);margin-right:6px}
.pause-btn{padding:5px 11px;border:1px solid var(--border2);border-radius:99px;background:var(--bg);cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);font-family:inherit}
.pause-btn.paused{background:#c0392b;color:#fff;border-color:#c0392b}
.manage-sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:10px 0 4px}
.wa-info{background:#dcf8c6;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:11px;color:#075e54}
.wa-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.wa-row:last-of-type{border-bottom:none}
.wa-station{font-weight:600;color:var(--text)}
.wa-num{color:var(--text3);font-family:monospace}
.history-card{border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;background:var(--card)}
.history-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.history-table{font-size:12px;font-weight:700;background:var(--fire);color:#fff;border-radius:6px;padding:2px 8px}
.history-time{font-size:11px;color:var(--text3)}
.history-tot{font-size:13px;font-weight:700;color:var(--text)}
.history-items{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">🌋 <em>VOLCANO</em> POS</div>
    <div class="vtabs">
      <button class="vtab on" id="vv-order" onclick="vswitch('order')">落單</button>
      <button class="vtab" id="vv-history" onclick="vswitch('history')">歷史</button>
      <button class="vtab" onclick="openManage()">管理</button>
    </div>
  </div>

  <!-- ORDER VIEW -->
  <div class="view on" id="view-order">
    <div class="table-bar">
      <div class="table-row1">
        <span class="table-label">🪑 枱號 Table</span>
        <input class="tno-custom" id="tno-custom" type="text" inputmode="numeric" placeholder="其他" oninput="setTableCustom(this.value)">
        <span id="cur-table-display" style="font-size:12px;font-weight:700;color:var(--fire);margin-left:4px"></span>
      </div>
      <div class="table-scroll" id="table-scroll"></div>
    </div>
    <div class="station-tabs">
      <button class="stab on-water" id="tb-water" onclick="stabSwitch('water')">💧 水吧<br>Water Bar</button>
      <button class="stab" id="tb-fire" onclick="stabSwitch('fire')">🔥 火位<br>Hot Station</button>
      <button class="stab" id="tb-noodle" onclick="stabSwitch('noodle')">🍜 麵位<br>Noodle Bar</button>
    </div>
    <div class="order-body">
      <div class="menu-scroll">
        <div id="p-water" class="panel on"></div>
        <div id="p-fire" class="panel"></div>
        <div id="p-noodle" class="panel"></div>
      </div>
      <div class="cart-area">
        <div class="cart-hd">
          <span class="cart-title">當前訂單 Current Order</span>
          <button class="clr-btn" onclick="clearCart()">清除 Clear</button>
        </div>
        <div id="cart-list"><div class="empty-msg">請選擇項目 Select items above</div></div>
        <div id="cart-foot" style="display:none">
          <div class="cart-foot-inner">
            <div class="table-warn" id="table-warn">⚠️ 請先選擇枱號 Please select a table</div>
            <input class="rmk" id="rmk" placeholder="備注 Remarks（特別要求…）">
            <div class="total-row">
              <span class="total-lbl">合計 Total</span>
              <span class="total-amt" id="tot">£0.00</span>
            </div>
            <button class="send-btn" onclick="sendOrder()">📲 落單（複製內容＋開 WhatsApp 群組）</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div class="view" id="view-history">
    <div class="station-view-body" style="flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch" id="history-body">
      <div class="no-orders">暫無歷史訂單</div>
    </div>
  </div>
</div>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet" id="modal-sheet"></div>
</div>

<!-- MANAGE MODAL -->
<div class="manage-overlay" id="manage-overlay">
  <div class="manage-sheet" id="manage-sheet"></div>
</div>

<script>

function buildTableBtns() {

function setTable(val) {
  currentTable=val;
  document.getElementById('tno-custom').value='';
  document.getElementById('cur-table-display').textContent='枱 '+val;
  var btns=document.getElementById('table-scroll').querySelectorAll('.tno-btn');

}

}

// ─────────────────────────────────────────
// TOGGLE HANDLERS
// ─────────────────────────────────────────
function togTop(el){
  var name=el.getAttribute('data-top'),isFire=el.getAttribute('data-fire')==='1',isExtra=el.getAttribute('data-xtra')==='1',sc=el.getAttribute('data-sel');
  var isOn=el.classList.contains(sc);
  if(isOn){el.classList.remove('sel-w','sel-f','sel-n');for(var i=0;i<selToppings.length;i++){if(selToppings[i].name===name){selToppings.splice(i,1);break;}}}
  else{
    el.classList.add(sc); selToppings.push({name:name,isFire:isFire,isExtra:isExtra});
  }
  var cnt=selToppings.length,cost=0;
  for(var i=0;i<selToppings.length;i++){if(i>0)cost+=2;if(selToppings[i].isExtra)cost+=2;}
  var el2=document.getElementById('top-status');if(el2){el2.className='topping-status';el2.textContent='已選 '+cnt+' 款'+(cost>0?'  額外 +£'+cost:'  首1款包含');}
}
function togDrinkTop(el){
  var name=el.getAttribute('data-dtop'),sc=el.getAttribute('data-sel'),isOn=el.classList.contains(sc);
  if(isOn){el.classList.remove('sel-w','sel-f','sel-n');for(var i=0;i<selDrinkToppings.length;i++){if(selDrinkToppings[i]===name){selDrinkToppings.splice(i,1);break;}}}
  else{el.classList.add(sc);selDrinkToppings.push(name);}
  var cnt=selDrinkToppings.length,cost=Math.max(0,cnt-1)*0.5;
  var el2=document.getElementById('dtop-status');if(el2){el2.textContent=cnt===0?'未選配料':'已選 '+cnt+' 款'+(cost>0?'  額外 +£'+cost.toFixed(2):'  免費換');}
}
function togGarnish(el){
  var name=el.getAttribute('data-garnish'),gp=parseFloat(el.getAttribute('data-gprice')||'0')||0,sc=el.getAttribute('data-sel'),isOn=el.classList.contains(sc);
  if(isOn){el.classList.remove('sel-w','sel-f','sel-n');for(var i=0;i<selGarnish.length;i++){if(selGarnish[i].label===name){selGarnish.splice(i,1);break;}}}
  else{el.classList.add(sc);selGarnish.push({label:name,price:gp});}
}
function selOpt(el){
  var mk=el.getAttribute('data-key'),val=el.getAttribute('data-val'),sc=el.getAttribute('data-sel'),dp=parseFloat(el.getAttribute('data-drinkprice')||'0')||0;
  var siblings=el.parentElement.querySelectorAll('[data-key="'+mk+'"]');
  for(var i=0;i<siblings.length;i++) siblings[i].classList.remove('sel-w','sel-f','sel-n');
  el.classList.add(sc); custSel[mk]={val:val,drinkPrice:dp};
}

// ─────────────────────────────────────────
// CONFIRM MOD
// ─────────────────────────────────────────
function confirmMod(){
  if(!pendingItem) return;
  var modParts=[],extraPrice=0,fireTops=[],waterNotes=[];
  var keys=Object.keys(custSel);
  for(var i=0;i<keys.length;i++){var k=keys[i],v=custSel[k].val,dp=custSel[k].drinkPrice||0;if(v){modParts.push(v);extraPrice+=dp;}}
  if(selDrinkToppings.length>0){
    var dtcost=Math.max(0,selDrinkToppings.length-1)*0.5;
    modParts.push('飲品配料：'+selDrinkToppings.join('、')); extraPrice+=dtcost;
  }
  var drinkKeys=['sugar','ice','milk','set_drink','noodle_drink','cup_size'];
  var dnp=[];
  for(var i=0;i<drinkKeys.length;i++){var k=drinkKeys[i];if(custSel[k]&&custSel[k].val) dnp.push(custSel[k].val);}
  if(selDrinkToppings.length>0) dnp.push('配料：'+selDrinkToppings.join('、'));
  if(dnp.length>0) waterNotes=dnp;
  if(pendingItem.mods.indexOf('TOPPINGS')>=0&&selToppings.length>0){
    var topNames=[];
    for(var i=0;i<selToppings.length;i++){var t=selToppings[i];topNames.push(t.name);if(i>0)extraPrice+=2;if(t.isExtra)extraPrice+=2;if(t.isFire)fireTops.push(t.name);}
    modParts.push('配料：'+topNames.join('、'));
  }
  if(selGarnish.length>0){var gl=[];for(var i=0;i<selGarnish.length;i++){gl.push(selGarnish[i].label);extraPrice+=selGarnish[i].price;}modParts.push(gl.join(' '));}
  addToCart(pendingItem.st,pendingItem.zh,pendingItem.en,pendingItem.p,modParts.join(' · '),fireTops,waterNotes,extraPrice);
  closeModal();
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('on');
  pendingItem=null;custSel={};selToppings=[];selDrinkToppings=[];selGarnish=[];
}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ─────────────────────────────────────────
function addToCart(st,zh,en,p,mods,fireTops,waterNotes,extraP){
  cart.push({st:st,zh:zh,en:en,p:p+(extraP||0),qty:1,mods:mods,fireTops:fireTops||[],waterNotes:waterNotes||[]});
  renderCart();
}
function chgQty(idx,d){cart[idx].qty+=d;if(cart[idx].qty<=0)cart.splice(idx,1);renderCart();}
function clearCart(){cart=[];renderCart();}

function renderCart(){
  var l=document.getElementById('cart-list'),f=document.getElementById('cart-foot');
  if(!cart.length){l.innerHTML='<div class="empty-msg">請選擇項目 Select items above</div>';f.style.display='none';return;}
  var tot=0,h='';
  for(var i=0;i<cart.length;i++){
    var it=cart[i],sub=it.p*it.qty;tot+=sub;
    var bc=it.st==='water'?'bw':it.st==='fire'?'bf':'bn';
    var bl=it.st==='water'?'💧水吧':it.st==='fire'?'🔥火位':'🍜麵位';
    h+='<div class="crow"><span class="cbadge '+bc+'">'+bl+'</span>'+

// [8] Export orders as CSV
function downloadCSV() {
  if (!orderHistory.length) { alert('暫無訂單資料 No orders yet'); return; }
  var rows = [];
  // Header row
  rows.push(['訂單編號','日期時間','枱號','商品','配料/飲品/要求','金額(£)','訂單總計(£)']);
  var grandTotal = 0;
  for (var i=0;i<orderHistory.length;i++) {
    var o = orderHistory[i];
    grandTotal += o.tot||0;
    // Collect all items
    var itemLines = [];
    var modLines = [];
    for (var j=0;j<o.items.length;j++) {
      var it = o.items[j];
      itemLines.push(it.zh + ' ×' + it.qty + ' £' + (it.p*it.qty).toFixed(2));
      if (it.mods) modLines.push(it.mods);
    }
    if (o.rmk) modLines.push('備注：'+o.rmk);
    var today = new Date();
    var dateStr = today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
    rows.push([
      '#'+o.no,
      dateStr+' '+o.ts,
      o.table||'',
      '"'+itemLines.join('\n')+'"',
      '"'+(modLines.join('\n')||'-')+'"',
      (o.tot||0).toFixed(2),
      '' // blank, filled in summary
    ]);
  }
  // Summary row
  rows.push(['','','','','合計 GRAND TOTAL','',grandTotal.toFixed(2)]);

  var csv = rows.map(function(r){ return r.join(','); }).join('\n');
  var BOM = '\uFEFF'; // UTF-8 BOM for Excel
  var blob = new Blob([BOM+csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var now = new Date();
  var fname = 'VOLCANO_orders_'+now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate()+'.csv';
  a.href=url; a.download=fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function parseMods(modsStr) {
  if (!modsStr) return {spice:'',sugar:'',ice:'',milk:'',tops:[],drink:'',garnish:[],size:''};
  var result = {spice:'',sugar:'',ice:'',milk:'',tops:[],drink:'',garnish:[],size:''};
  var parts = modsStr.split(' · ');
  for (var i=0;i<parts.length;i++) {
    var p = parts[i].trim();
    // Spice
    if (p.indexOf('Mild')>-1||p.indexOf('Med')>-1||p.indexOf('Hot')>-1||p.indexOf('辣')>-1) {
      result.spice = SPICE_EMOJI[p] || p;
    }
    // Sugar
    else if (SUGAR_SHORT[p]) { result.sugar = SUGAR_SHORT[p]; }
    // Ice
    else if (ICE_SHORT[p]) { result.ice = ICE_SHORT[p]; }
    // Milk
    else if (p.indexOf('Oat')>-1) { result.milk = '燕麥'; }
    // Size upgrade
    else if (p.indexOf('700ml')>-1) { result.size = '大杯'; }
    // Toppings line
    else if (p.indexOf('配料：')===0) {
      var topStr = p.replace('配料：','');
      result.tops = topStr.split('、').map(function(t){return shorten(t.trim());});
    }
    // Garnish
    else if (p==='多葱'||p==='走葱'||p==='多芫茜'||p==='走芫茜'||p==='走芽菜'||p==='走腐皮'||p.indexOf('加底')>-1) {
      result.garnish.push(p.indexOf('+')>-1?'加底':p);
    }
    // Drink
    else if (p.indexOf('珍奶')>-1||p.indexOf('茶')>-1||p.indexOf('拿鐵')>-1||p.indexOf('罐裝')>-1||SHORT_NAMES[p]||p.indexOf('不加')===0) {
      if (p!=='不加') result.drink = shorten(p);
    }
    // Noodle type
    else if (p==='脆麵+咖喱'||p==='乾撈麵+蠔油') { result.drink = p; }
    // Toast filling
    else if (p.indexOf('Peanut')>-1||p.indexOf('Hazelnut')>-1||p.indexOf('Pistachio')>-1||p.indexOf('Cheese')>-1) {
      result.drink = p.split(' ')[0];
    }
    // Side
    else if (p==='白飯 Rice'||p==='薯條 Chips') { result.size = (p==='白飯 Rice'?'白飯':'薯條'); }
    // Sauce
    else if (p.indexOf('Curry')>-1) { result.sugar = '咖喱'; }
    else if (p.indexOf('Teriyaki')>-1) { result.sugar = '照燒'; }
  }
  return result;
}

// Format one drink line: 黑糖珍奶｜少糖｜少冰｜燕麥
function formatDrinkLine(drinkName, m) {
  var parts = [shorten(drinkName)];
  if (m.size && m.size!=='白飯'&&m.size!=='薯條') parts.push(m.size);
  if (m.sugar) parts.push(m.sugar);
  if (m.ice) parts.push(m.ice);
  if (m.milk) parts.push(m.milk);
  return parts.join('｜');
}

// BUILD SMART STATION MESSAGES
// ─────────────────────────────────────────
function buildSmartMessages(byStation, fireTaskTops, waterTaskNotes, table, no, rmk, tot) {
  var now = new Date();
  var hh=now.getHours(),mm=now.getMinutes();
  var ts=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
  var header = '🌋 #'+no+'  枱'+table+'  '+ts;
  var divider = '─────────';

  // ── 🔥 FIRE STATION ──
  var fireLines = [header, '🔥 火位', divider];
  if (byStation['fire'] && byStation['fire'].length) {
    for (var i=0;i<byStation['fire'].length;i++){
      var it=byStation['fire'][i];
      var m=parseMods(it.mods);
      var name=shorten(it.zh);
      var qty=it.qty>1?'×'+it.qty:'';
      var line=name+qty;
      if(m.size&&(m.size==='白飯'||m.size==='薯條')) line+='  '+m.size;
      if(m.sugar&&(m.sugar==='咖喱'||m.sugar==='照燒')) line+='  '+m.sugar;
      // [2] Set F 西多：顯示口味
      if(it.zh.indexOf('西多')>-1){
        var tf=extractToastFlavour(it.mods);
        if(tf) line+='（'+tf+'）';
      }
      fireLines.push(line);
    }
  }
  // [7] Fire tasks from noodle toppings — formatted as bullet list
  if (fireTaskTops.length>0) {
    var ftMerged={};
    for(var i=0;i<fireTaskTops.length;i++){var fs=shorten(fireTaskTops[i]);ftMerged[fs]=(ftMerged[fs]||0)+1;}
    fireLines.push('配料：');
    Object.keys(ftMerged).forEach(function(k){fireLines.push('• '+k+(ftMerged[k]>1?' ×'+ftMerged[k]:''));});
  }
  if (rmk) fireLines.push('📝 '+rmk);
  fireLines.push('─────────');

  // ── 🍜 NOODLE STATION — [3] 完整顯示所有配菜要求 ──
  var noodleLines = [header, '🍜 麵位', divider];
  if (byStation['noodle'] && byStation['noodle'].length) {
    for (var i=0;i<byStation['noodle'].length;i++){
      var it=byStation['noodle'][i];
      var m=parseMods(it.mods);
      var name=shorten(it.zh);
      var qty=it.qty>1?'×'+it.qty:'';
      // Line 1: 湯底 + 辣度
      var spicePart=m.spice?' '+m.spice:'';
      noodleLines.push(name+qty+spicePart);
      // Line 2: 配料（完整顯示）
      if(m.tops.length>0){
        var tMerged={};
        for(var j=0;j<m.tops.length;j++){tMerged[m.tops[j]]=(tMerged[m.tops[j]]||0)+1;}
        var tStr=Object.keys(tMerged).map(function(k){return k+(tMerged[k]>1?'×'+tMerged[k]:'');}).join('  ');
        noodleLines.push('配：'+tStr);
      }
      // Line 3: 走料 ❌
      if(m.garnish.length>0){
        var walks=m.garnish.filter(function(g){return g.indexOf('走')===0;});
        var adds=m.garnish.filter(function(g){return g==='多葱'||g==='多芫茜';});
        var extra=m.garnish.filter(function(g){return g==='加底';});
        if(walks.length>0) noodleLines.push('❌ '+walks.map(function(g){return g.replace('走','');}).join(' '));
        if(adds.length>0) noodleLines.push('➕ '+adds.join(' '));
        if(extra.length>0) noodleLines.push('加底');
      }
      // Line 4: 追加飲品
      if(m.drink&&m.drink!=='不加'){
        var dLine='飲：'+m.drink;
        if(m.sugar) dLine+='  '+m.sugar;
        if(m.ice) dLine+='  '+m.ice;
        if(m.milk) dLine+='  '+m.milk;
        noodleLines.push(dLine);
      }
    }
  }
  if (rmk) noodleLines.push('📝 '+rmk);
  noodleLines.push('─────────');

  // ── 🥤 WATER BAR ──
  var waterLines = [header, '🥤 水吧', divider];
  if (byStation['water'] && byStation['water'].length) {
    for (var i=0;i<byStation['water'].length;i++){
      var it=byStation['water'][i];
      var m=parseMods(it.mods);
      var qty=it.qty>1?'×'+it.qty:'';
      // [9] 雪糕：顯示口味
      if(it.zh.indexOf('雪糕')>-1){
        var flavour=m.drink||'';
        waterLines.push('雪糕'+qty+(flavour?'（'+flavour+'）':''));
        continue;
      }
      var dtops=it.mods&&it.mods.indexOf('飲品配料：')>-1?it.mods.match(/飲品配料：([^·]+)/):null;
      var dtopStr=dtops?'  配：'+dtops[1].trim():'';
      waterLines.push(formatDrinkLine(it.zh,m)+qty+dtopStr);
    }
  }
  for(var i=0;i<waterTaskNotes.length;i++){
    var wt=waterTaskNotes[i];
    var drinkName='';
    var m2={sugar:'',ice:'',milk:'',size:''};
    for(var j=0;j<wt.notes.length;j++){
      var n=wt.notes[j];
      if(SHORT_NAMES[n]){drinkName=SHORT_NAMES[n];}
      else if(SUGAR_SHORT[n]){m2.sugar=SUGAR_SHORT[n];}
      else if(ICE_SHORT[n]){m2.ice=ICE_SHORT[n];}
      else if(n.indexOf('Oat')>-1){m2.milk='燕麥';}
      else if(n.indexOf('700ml')>-1){m2.size='大杯';}
    }
    if(drinkName){
      var prefix=wt.from==='fire'?'[套餐]':'[麵位]';
      waterLines.push(prefix+' '+formatDrinkLine(drinkName,m2));
    }
  }
  if (rmk) waterLines.push('📝 '+rmk);
  waterLines.push('─────────');

  // ── COMBINED MESSAGE (all stations in one) ──
  var combined = [];
  combined.push(header);
  combined.push('');

  if (byStation['fire']&&byStation['fire'].length||fireTaskTops.length>0) {
    combined.push('🔥 火位');
    combined = combined.concat(fireLines.slice(3, fireLines.length-1));
    combined.push('');
  }
  if (byStation['noodle']&&byStation['noodle'].length) {
    combined.push('🍜 麵位');
    combined = combined.concat(noodleLines.slice(3, noodleLines.length-1));
    combined.push('');
  }
  if (byStation['water']&&byStation['water'].length||waterTaskNotes.length>0) {
    combined.push('🥤 水吧');
    combined = combined.concat(waterLines.slice(3, waterLines.length-1));
    combined.push('');
  }

  if (rmk) { combined.push('📝 '+rmk); combined.push(''); }
  combined.push('合計 £'+tot.toFixed(2));

  return combined.join('\n');
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  // fallback
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
  return Promise.resolve();
}

// SEND ORDER → COPY TEXT + OPEN WHATSAPP GROUP
// ─────────────────────────────────────────
function sendOrder(){
  if(!cart.length) return;
  if(!currentTable){document.getElementById('table-warn').style.display='block';return;}
  var rmk=document.getElementById('rmk').value.trim();
  var tot=0; for(var i=0;i<cart.length;i++) tot+=cart[i].p*cart[i].qty;
  var no=String(oNo++); while(no.length<3) no='0'+no;

  var byStation={};
  var fireTaskTops=[];
  var waterTaskNotes=[];

  for(var i=0;i<cart.length;i++){
    var it=cart[i];
    if(!byStation[it.st]) byStation[it.st]=[];
    byStation[it.st].push({zh:it.zh,en:it.en,p:it.p,qty:it.qty,mods:it.mods});
    if(it.st==='noodle'&&it.fireTops&&it.fireTops.length>0){
      fireTaskTops = fireTaskTops.concat(it.fireTops);
    }
    if((it.st==='fire'||it.st==='noodle')&&it.waterNotes&&it.waterNotes.length>0){
      waterTaskNotes.push({notes:it.waterNotes,from:it.st});
    }
  }

  var fullMsg = buildSmartMessages(byStation, fireTaskTops, waterTaskNotes, currentTable, no, rmk, tot);

  // Copy to clipboard then open the group
  copyToClipboard(fullMsg).then(function(){
    showCopyToast();
    setTimeout(function(){
      window.open(WA_GROUP_LINK, '_blank');
    }, 400);
  }).catch(function(){
    // Even if copy fails, still open the group
    setTimeout(function(){
      window.open(WA_GROUP_LINK, '_blank');
    }, 200);
  });

  // Save to history
  orderHistory.unshift({no:no, table:currentTable, items:cart.slice(), tot:tot, rmk:rmk, ts:new Date().toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'})});
  saveHistory();
  renderHistory();

  cart=[];
  document.getElementById('rmk').value='';
  renderCart();
}

  var h='';
  for (var i=0;i<orderHistory.length;i++){
    var o=orderHistory[i];
    var itemsTxt = o.items.map(function(it){return it.zh+'×'+it.qty;}).join('、');
    h+='<div class="history-card">'+
      '<div class="history-top"><span class="history-table">枱 '+o.table+'</span><span class="history-time">#'+o.no+' · '+o.ts+'</span></div>'+
      '<div class="history-items">'+itemsTxt+'</div>'+
      '<div class="history-tot" style="margin-top:6px">£'+o.tot.toFixed(2)+'</div>'+
      '</div>';
  }
  el.innerHTML=h;
}

function saveHistory(){
  try{ localStorage.setItem('volcano_history', JSON.stringify({history:orderHistory,oNo:oNo})); }catch(e){}
}
function loadHistory(){
  try{ var r=localStorage.getItem('volcano_history'); if(r){var d=JSON.parse(r); if(d.history){orderHistory=d.history;oNo=d.oNo||1;}} }catch(e){}
}
function clearHistory(){
  if(!confirm('確認清除所有歷史訂單？\nConfirm clear all order history?')) return;
  orderHistory=[]; oNo=1; saveHistory(); renderHistory(); closeManage();
}

// ─────────────────────────────────────────
// MANAGE / PAUSE + WHATSAPP NUMBERS DISPLAY
// ─────────────────────────────────────────
function openManage(){
  var stNames={water:'💧 水吧',fire:'🔥 火位',noodle:'🍜 麵位'};
  var stKeys=['water','fire','noodle'];
  var h='<div class="modal-handle"></div><div class="modal-title" style="margin-bottom:10px">管理 Manage</div>';

  h+='<div class="wa-info">📲 訂單會複製到剪貼簿，並打開以下 WhatsApp 群組（請手動貼上發送）</div>';
  h+='<div class="wa-row"><span class="wa-station">🌋 訂單群組</span><span class="wa-num" style="font-size:10px;word-break:break-all">'+WA_GROUP_LINK+'</span></div>';

  h+='<div style="display:flex;gap:8px;margin-bottom:14px">'+
    '<button onclick="downloadCSV()" style="flex:1;padding:10px;border:none;border-radius:10px;background:var(--noodle);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">📥 匯出訂單 CSV</button>'+
    '<button onclick="clearHistory()" style="flex:1;padding:10px;border:1px solid #c0392b;border-radius:10px;background:transparent;color:#c0392b;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🗑 清除歷史</button>'+
    '</div>';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px">暫停菜式 Pause Items</div>';
  for(var s=0;s<stKeys.length;s++){
    var st=stKeys[s];
    h+='<div class="manage-sec">'+stNames[st]+'</div>';
    for(var i=0;i<MENU_ITEMS.length;i++){
      if(MENU_ITEMS[i].st!==st) continue;
      var ip=!!pausedItems[i];
      h+='<div class="manage-row"><span class="manage-name">'+MENU_ITEMS[i].zh+'</span>'+
        '<span class="manage-price">£'+MENU_ITEMS[i].p.toFixed(2)+'</span>'+
        '<button class="pause-btn'+(ip?' paused':'')+'" onclick="togglePause('+i+')">'+(ip?'恢復 Resume':'暫停 Pause')+'</button></div>';
    }
  }
  h+='<div style="margin-top:16px"><button onclick="closeManage()" style="width:100%;padding:13px;border:none;border-radius:10px;background:var(--text);color:var(--bg);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">關閉 Close</button></div>';
  document.getElementById('manage-sheet').innerHTML=h;
  document.getElementById('manage-overlay').classList.add('on');
}
function closeManage(){ document.getElementById('manage-overlay').classList.remove('on'); }
function togglePause(idx){
  pausedItems[idx]=!pausedItems[idx];
  try{localStorage.setItem('volcano_paused',JSON.stringify(pausedItems));}catch(e){}
  buildPanels(); openManage();
}
document.getElementById('manage-overlay').addEventListener('click',function(e){if(e.target===this)closeManage();});

// ─────────────────────────────────────────
// SWITCH
// ─────────────────────────────────────────
function stabSwitch(t){
  var tabs=['water','fire','noodle'];
  for(var i=0;i<tabs.length;i++){var x=tabs[i];document.getElementById('p-'+x).classList[x===t?'add':'remove']('on');document.getElementById('tb-'+x).className='stab'+(x===t?' on-'+x:'');}
}
function vswitch(v){
  document.getElementById('view-order').classList[v==='order'?'add':'remove']('on');
  document.getElementById('view-history').classList[v==='history'?'add':'remove']('on');
  document.getElementById('vv-order').classList[v==='order'?'add':'remove']('on');
  document.getElementById('vv-history').classList[v==='history'?'add':'remove']('on');
  if(v==='history') renderHistory();
}

// ─────────────────────────────────────────
// INIT (wrapped in try-catch for safety + visible error display)
// ─────────────────────────────────────────
function showFatalError(msg) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:12px;font-size:12px;z-index:9999;font-family:monospace;white-space:pre-wrap;';
  el.textContent = '⚠️ 載入錯誤 Load Error:\n' + msg;
  document.body.appendChild(el);
}

try {
  try{var pp=localStorage.getItem('volcano_paused');if(pp)pausedItems=JSON.parse(pp);}catch(e){}
  loadHistory();
  buildTableBtns();
  buildPanels();
  renderHistory();
} catch(initErr) {
  showFatalError(initErr.message + '\n' + (initErr.stack||''));
}

window.addEventListener('error', function(e){
  showFatalError(e.message + ' (line ' + e.lineno + ')');
});
</script>
</body>
